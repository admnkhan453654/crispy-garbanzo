<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Test Screen</title>
    <style>
        /* Reset and prevent scrolling */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Fullscreen background configuration */
        body {
            background: rgba(0, 0, 0, 0.6); /* Semi-transparent dark background for readability */
            background-image: url('AK.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Center the content vertically and horizontally */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 20px; /* Prevents text from touching phone edges */
        }

        /* Container styling */
        .wrapper {
            background: rgba(0, 0, 0, 0.6); /* Semi-transparent dark background for readability */
            padding: 20px;
            border-radius: 12px;
            max-width: 90%; /* Ensures it scales well on narrow screens */
            box-sizing: border-box;
        }

        .form-box h2 {
            color: #00ff00; /* Classic hacker green */
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 {
            color: #ff3333; /* Slightly brighter red for mobile screens */
            font-size: 1.2rem; /* Scaled down so it fits nicely on a phone */
            line-height: 1.5;
            margin: 15px 0 0 0;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="form-box Hacker">
            <h2>Hacker</h2>
        </div>
        
        <h1>
            It looks like you're trying to debug an offline AI system, running a diagnostic test, or checking my status. If you have an offline model or automated test suite that's acting up, let me know the details. 
        </h1>
    </div>

</body>
</html>
