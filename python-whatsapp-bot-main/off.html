<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Offline</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    text-align:center;
    background:#222;
    padding:35px;
    border-radius:15px;
    width:90%;
    max-width:500px;
    box-shadow:0 0 20px rgba(255,0,0,0.2);
}

img{
    width:180px;
    max-width:100%;
    border-radius:10px;
    margin-bottom:20px;
}

h1{
    color:#ff4d4d;
    font-size:28px;
}

p{
    color:#ddd;
    font-size:16px;
}

a{
    display:inline-block;
    margin-top:20px;
    padding:10px 25px;
    background:#ff4d4d;
    color:white;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
}

a:hover{
    background:#ff1a1a;
}

footer{
    margin-top:20px;
    color:#aaa;
    font-size:14px;
}
</style>

</head>

<body>

<div class="card">

    <img src="live.png" alt="Live Image">

    <h1>⚠ SYSTEM OFFLINE</h1>

    <p>The system is currently unavailable.</p>
    <p>Please try again later.</p>

    <a href="on.html">OK</a>

    <footer>
        Offline by Ayan
    </footer>

</div>

</body>
</html>
