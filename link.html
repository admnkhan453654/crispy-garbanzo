<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AK By Ayan Khan</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;
padding-top:90px;

display:flex;
justify-content:center;
align-items:center;

font-family:Arial,sans-serif;

background:linear-gradient(
-45deg,
#25D366,
#128C7E,
#075E54,
#34B7F1,
#00eaff
);

background-size:400% 400%;

animation:liveBackground 8s infinite;

transition:1s;

}


@keyframes liveBackground{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}


/* NAVBAR */

.navbar{

position:fixed;
top:0;
left:0;
right:0;

background:rgba(3,8,16,.85);

backdrop-filter:blur(20px);

padding:15px 20px;

z-index:100;

}


.nav-container{

display:flex;

align-items:center;

}


.brand{

display:flex;

align-items:center;

gap:12px;

text-decoration:none;

}



.logo-box{

width:45px;
height:45px;

border-radius:50%;

overflow:hidden;

border:2px solid #00eaff;

box-shadow:0 0 15px #00eaff;

}



.logo-box img{

width:100%;
height:100%;

object-fit:cover;

border-radius:50%;

}



.title{

color:white;

font-size:14px;

font-weight:900;

letter-spacing:3px;

}



.subtitle{

color:#00eaff;

font-size:10px;

font-family:monospace;

}



/* INSTAGRAM */


.instagram-btn{

margin-left:auto;

background:linear-gradient(
45deg,
#f58529,
#dd2a7b,
#8134af
);

color:white;

padding:10px 15px;

border-radius:10px;

font-size:13px;

font-weight:bold;

text-decoration:none;

}



.instagram-btn:hover{

transform:scale(1.05);

}




/* CARD */


.box{

width:90%;

max-width:400px;

background:white;

padding:30px;

border-radius:20px;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,.4);

transition:.5s;

}



.logo{

width:100px;

height:100px;

border-radius:50%;

object-fit:cover;

box-shadow:0 0 20px #00eaff;

}



h1{

color:#075E54;

margin:15px 0;

}


p{

color:#555;

}



#time{

margin-top:10px;

font-size:18px;

}



#status{

font-size:22px;

font-weight:bold;

margin:20px;

}



.whatsapp-btn{

display:block;

margin-top:15px;

padding:15px;

background:#25D366;

color:white;

text-decoration:none;

border-radius:12px;

font-size:18px;

font-weight:bold;

}



.warning{

display:none;

background:#ff0000;

color:white;

padding:15px;

border-radius:12px;

margin-top:15px;

font-weight:900;

animation:warningBlink 1s infinite;

box-shadow:0 0 25px red;

}


@keyframes warningBlink{

0%{
transform:scale(1);
box-shadow:0 0 10px red;
}

50%{
transform:scale(1.05);
box-shadow:0 0 40px red;
}

100%{
transform:scale(1);
box-shadow:0 0 10px red;
}

}



.powered-by{

margin-top:20px;

font-weight:bold;

color:#075E54;

}


</style>

</head>


<body>



<nav class="navbar">

<div class="nav-container">


<a class="brand" href="#">


<div class="logo-box">

<img src="live.png" alt="Logo">

</div>


<div>

<div class="title">
AK By Ayan Khan
</div>


<div class="subtitle">
● Live System
</div>


</div>


</a>



<a class="instagram-btn"
href="https://instagram.com/ar20223_tv"
target="_blank">

📷 @ar20223_tv

</a>



</div>

</nav>





<div class="box">


<img src="live.png" class="logo" alt="Logo">


<h1>
AK By Ayan Khan
</h1>


<p>
DEAF HAPPY PIC COME YOU VS
</p>



<div id="time">
🕒 Loading Time...
</div>



<div id="status">
Checking Status...
</div>



<div id="warning" class="warning">

⚠️ WARNING! SYSTEM IS OFFLINE ⚠️

</div>




<a id="btn1" class="whatsapp-btn"
href="https://wa.me/923122127740"
target="_blank">

📲 WhatsApp 03122127740

</a>



<a id="btn2" class="whatsapp-btn"
href="https://wa.me/923181251104"
target="_blank">

📲 WhatsApp 03181251104

</a>




<div class="powered-by">

⚡ Powered By Ayan Khan

</div>



</div>





<script>

function updateStatus(){


let now=new Date();

let hours=now.getHours();


document.getElementById("time").innerHTML=
"🕒 "+now.toLocaleTimeString();



let status=document.getElementById("status");

let warning=document.getElementById("warning");

let box=document.querySelector(".box");

let buttons=document.querySelectorAll(".whatsapp-btn");


// 8 PM OFFLINE
// 10 AM ONLINE

let offline=(hours>=20 || hours<10);



if(offline){


document.body.style.background=
"linear-gradient(-45deg,#ff0000,#8b0000,#330000,#ff4444)";


document.body.style.animation=
"liveBackground 3s infinite";


box.style.border="4px solid red";

box.style.boxShadow="0 0 30px red";


status.innerHTML="🔴 SYSTEM OFFLINE";

status.style.color="red";


warning.style.display="block";


buttons.forEach(btn=>{

btn.removeAttribute("href");

btn.style.pointerEvents="none";

btn.style.background="#777";

btn.innerHTML="🚫 Service Unavailable";

});


}

else{


status.innerHTML="🟢 SYSTEM ONLINE";

status.style.color="green";


warning.style.display="none";


buttons.forEach(btn=>{

btn.style.pointerEvents="auto";

btn.style.background="#25D366";

btn.innerHTML=btn.id=="btn1"
?"📲 WhatsApp 03122127740"
:"📲 WhatsApp 03181251104";

});


}

}


updateStatus();

setInterval(updateStatus,1000);


</script>


</body>
</html>
