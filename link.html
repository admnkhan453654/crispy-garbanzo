<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SYSTEM OFFLINE - Ayan</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:#000;
    color:red;
    font-family:"Courier New", monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    padding:15px;
    position:relative;
}

/* Grid Background */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(rgba(255,0,0,.08) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,0,0,.08) 1px,transparent 1px);
    background-size:40px 40px;
    animation:grid 5s linear infinite;
    z-index:0;
}

@keyframes grid{
    from{background-position:0 0;}
    to{background-position:40px 40px;}
}

/* Scan Effect */
.scan{
    position:absolute;
    left:0;
    width:100%;
    height:3px;
    background:red;
    box-shadow:0 0 20px red;
    animation:scan 3s linear infinite;
    z-index:2;
}

@keyframes scan{
    from{top:0;}
    to{top:100%;}
}

/* Floating Particles */
.dot{
    position:absolute;
    width:5px;
    height:5px;
    background:red;
    border-radius:50%;
    box-shadow:0 0 15px red;
    animation:move 8s linear infinite;
    z-index:1;
}

@keyframes move{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-20vh);
    }
}

/* Main Box */
.container{
    position:relative;
    z-index:5;
    width:100%;
    max-width:650px;
    padding:35px;
    text-align:center;
    background:rgba(0,0,0,.85);
    border:2px solid red;
    box-shadow:
        0 0 25px red,
        inset 0 0 30px rgba(255,0,0,.3);
}

/* Logo */
.logo{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid red;
    padding:5px;
    background:#000;
    box-shadow:
        0 0 15px red,
        0 0 40px red,
        inset 0 0 20px red;
    animation:rotateLogo 4s linear infinite;
    margin-bottom:20px;
}

@keyframes rotateLogo{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* Title */
h1{
    font-size:55px;
    letter-spacing:5px;
    text-shadow:
        3px 0 darkred,
        -3px 0 red;
    animation:glitch .8s infinite;
}

@keyframes glitch{
    20%{transform:translate(-3px,2px);}
    40%{transform:translate(3px,-2px);}
    60%{transform:translate(-2px,1px);}
}

h2{
    margin-top:20px;
    color:#ff5555;
    letter-spacing:4px;
}

/* Divider */
.line{
    height:2px;
    background:red;
    margin:30px 0;
    box-shadow:0 0 15px red;
}

/* Information */
.info{
    color:#ff7777;
    font-size:20px;
    line-height:2;
}

/* Alert */
.alert{
    margin-top:25px;
    padding:15px;
    border:1px solid red;
    color:red;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:.4;
    }
}

/* Footer */
.footer{
    margin-top:25px;
    font-size:14px;
    letter-spacing:3px;
}

/* Mobile Responsive */
@media (max-width:768px){

    .container{
        padding:25px 20px;
    }

    .logo{
        width:130px;
        height:130px;
    }

    h1{
        font-size:36px;
        letter-spacing:3px;
    }

    h2{
        font-size:18px;
        letter-spacing:2px;
    }

    .info{
        font-size:16px;
        line-height:1.8;
    }

    .alert{
        font-size:15px;
    }

    .footer{
        font-size:12px;
        letter-spacing:2px;
    }
}

@media (max-width:480px){

    .container{
        padding:20px 15px;
    }

    .logo{
        width:100px;
        height:100px;
    }

    h1{
        font-size:28px;
        letter-spacing:2px;
    }

    h2{
        font-size:15px;
    }

    .info{
        font-size:14px;
    }

    .alert{
        font-size:13px;
        padding:12px;
    }

    .footer{
        font-size:11px;
        letter-spacing:1px;
    }
}

</style>

</head>

<body>

    <div class="alert">

    <div class="footer">

</div>

</body>
</html>
