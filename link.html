<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AK BY AYAN KHAN</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}


/* WARNING PAGE */

#warningPage{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:red;
    animation:redFlash .8s infinite alternate;
}


@keyframes redFlash{
    from{background:#ff0000;}
    to{background:#700000;}
}


.scan{
    position:absolute;
    inset:0;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.1) 0px,
        rgba(255,255,255,.1) 2px,
        transparent 2px,
        transparent 6px
    );
    animation:scanMove 3s linear infinite;
}


@keyframes scanMove{
    from{transform:translateY(-100%);}
    to{transform:translateY(100%);}
}


.warning{
    position:relative;
    z-index:2;
    text-align:center;
    color:white;
    background:rgba(0,0,0,.7);
    border:5px solid white;
    border-radius:20px;
    padding:50px;
    width:90%;
    max-width:600px;
    box-shadow:0 0 40px white;
    animation:blink .6s infinite;
}


@keyframes blink{
    50%{opacity:.5;}
}


.warning h1{
    font-size:55px;
}


.warning p{
    font-size:35px;
    margin-top:20px;
}


.status{
    margin-top:25px;
    color:#ffaaaa;
    font-size:22px;
}


.owner{
    margin-top:25px;
    font-size:30px;
    font-weight:bold;
}


button{
    margin-top:25px;
    padding:15px 35px;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:white;
    color:red;
}


button:hover{
    background:black;
    color:white;
}



/* STOP PAGE */


#stopPage{
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    background:red;
    animation:bgLive 2s infinite alternate;
}


@keyframes bgLive{
    from{background:#ff0000;}
    to{background:#500000;}
}



.poster{

    width:600px;
    height:600px;
    max-width:90vw;
    max-height:90vh;

    background:
    linear-gradient(
        rgba(255,0,0,.45),
        rgba(0,0,0,.75)
    ),
    url("AKBY.png");

    background-size:cover;
    background-position:center;

    border:5px solid white;
    border-radius:20px;

    display:flex;
    justify-content:center;
    align-items:center;

    animation:glow 1s infinite alternate;
}



@keyframes glow{

    from{
        box-shadow:0 0 20px red;
    }

    to{
        box-shadow:0 0 70px red;
    }

}



.content{
    text-align:center;
    color:white;
    text-shadow:3px 3px 10px black;
    padding:20px;
}


.content h1{
    font-size:50px;
    color:yellow;
    margin-bottom:20px;
}


.content h2{
    font-size:32px;
    margin-bottom:20px;
}


.content p{
    font-size:25px;
    font-weight:bold;
    line-height:1.5;
    animation:textBlink 1s infinite;
}


@keyframes textBlink{
    50%{
        opacity:.5;
    }
}



/* PHONE RESPONSIVE */

@media(max-width:600px){

.warning{
    padding:25px;
}

.warning h1{
    font-size:35px;
}

.warning p{
    font-size:22px;
}

.status{
    font-size:16px;
}

.owner{
    font-size:22px;
}

button{
    font-size:16px;
    padding:12px 25px;
}

.poster{
    width:90vw;
    height:90vw;
}

.content h1{
    font-size:30px;
}

.content h2{
    font-size:20px;
}

.content p{
    font-size:16px;
}

}

</style>

</head>


<body>


<div id="warningPage">

<div class="scan"></div>


<div class="warning">

<h1>⚠️ WARNING! ⚠️</h1>

<p>SYSTEM IS OFFLINE</p>


<div class="status">
CONNECTION LOST<br>
ERROR CODE: 503
</div>


<div class="owner">
🔒 BLOCK BY AYAN KHAN 🔒
</div>


<button onclick="showStop()">
STOP SYSTEM
</button>


</div>

</div>




<div id="stopPage">


<div class="poster">


<div class="content">


<h1>
AK BY AYAN KHAN
</h1>


<h2>
STOP POST BY AYAN
</h2>


<p>
SYSTEM OFFLINE<br>
PROBLEM SOLVED<br>
THE QUESTION STOP
</p>


<button onclick="goBack()">
GO BACK
</button>


</div>


</div>


</div>




<script>

function showStop(){

document.getElementById("warningPage").style.display="none";

document.getElementById("stopPage").style.display="flex";

}


function goBack(){

document.getElementById("stopPage").style.display="none";

document.getElementById("warningPage").style.display="flex";

}

</script>


</body>
</html>
