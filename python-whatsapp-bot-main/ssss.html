<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="live.png">
    <title>AK by Ayan Khan</title>
    <style>
        /* Modern reset focusing on cross-device compatibility */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            font-family: Arial, sans-serif;
            transition: background-color 0.5s ease;
        }

        .container {
            position: relative;
            width: 100%;
            min-height: 100vh; /* Ensures it spans the screen but allows scrolling if virtual keyboards crowd it */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .live-feed {
            position: fixed; /* Ensures background stays fixed during mobile scrolling */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            opacity: 0.5;
            pointer-events: none; /* Prevents background image drag issues */
            transition: all 0.5s ease;
        }

        .overlay {
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.9);
            padding: 40px 30px;
            border-radius: 12px;
            width: 100%;
            /* Scaled up max-width slightly for a better appearance on full-screen desktop monitors */
            max-width: 380px; 
            text-align: center;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            transition: all 0.5s ease;
        }

        /* Responsive styling adjustment for very small mobile screens */
        @media (max-width: 360px) {
            .overlay {
                padding: 25px 20px;
            }
        }

        .overlay h2 {
            color: #00ff00;
            margin: 0 0 25px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
            transition: color 0.5s ease;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #444;
            border-radius: 6px;
            background-color: #222;
            color: #fff;
            font-size: 1rem;
            -webkit-appearance: none;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00ff00;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.3);
        }

        .message {
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            min-height: 20px;
        }

        .success { color: #00ff00; }
        .error { color: #ff3333; }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #00ff00;
            color: #000;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .login-btn:active {
            background-color: #00cc00;
            transform: scale(0.98);
        }

        /* --- System Locked Red Theme Styles --- */
        body.system-locked {
            background-color: #400000;
        }

        body.system-locked .live-feed {
            mix-blend-mode: color-burn;
            opacity: 0.15;
        }

        body.system-locked .overlay {
            background: rgba(30, 0, 0, 0.95);
            border-color: #ff3333;
            box-shadow: 0 0 35px rgba(255, 0, 0, 0.5);
        }

        body.system-locked .overlay h2 {
            color: #ff3333;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="AK.png" alt="Live Background Canvas" class="live-feed">

        <div class="overlay">
            <h2 id="formTitle">System Access</h2>
            
            <form id="loginForm">
                <div id="formFields">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter username" required autocomplete="off">
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                    
                    <button type="submit" class="login-btn">Access System</button>
                </div>
                <div id="feedback" class="message"></div>
            </form>
        </div>
    </div>

    <script>
    let failedAttempts = 0;
    // Keep a reference to the original inner fields layout for easy reset later
    const initialFieldsHTML = document.getElementById('formFields').innerHTML;

    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault(); 
        
        const userIn = document.getElementById('username')?.value;
        const passIn = document.getElementById('password')?.value;
        const feedback = document.getElementById('feedback');
        const formTitle = document.getElementById('formTitle');
        const formFields = document.getElementById('formFields');

        if (userIn === "Ayan" && passIn === "Ak20223") {
            feedback.className = "message success";
            feedback.innerText = "ACCESS GRANTED. INITIALIZING...";
            
            setTimeout(function() {
                window.location.href = "https://www.shrestha.live/";
            }, 1500);
            
        } else {
            failedAttempts++; 
            
            if (failedAttempts >= 3) {
                document.body.classList.add('system-locked');
                formTitle.innerText = "SYSTEM LOCKED";
                
                // Hide standard input controls
                formFields.innerHTML = "";
                
                // Set up and start a 100-second lock countdown
                let timeLeft = 100;
                feedback.className = "message error";
                feedback.style.fontSize = "1.2rem";
                feedback.style.marginTop = "20px";
                
                function updateCountdown() {
                    feedback.innerHTML = `MAX ATTEMPTS EXCEEDED.<br>ACCESS DENIED.<br><br><span style="font-size:1rem;">TRY AGAIN IN: ${timeLeft}s</span>`;
                    
                    if (timeLeft <= 0) {
                        clearInterval(countdownInterval);
                        // Reset the lock configuration back to operational state
                        failedAttempts = 0;
                        document.body.classList.remove('system-locked');
                        formTitle.innerText = "System Access";
                        feedback.style.fontSize = "";
                        feedback.style.marginTop = "";
                        feedback.className = "message";
                        feedback.innerText = "";
                        formFields.innerHTML = initialFieldsHTML;
                    }
                    timeLeft--;
                }
                
                updateCountdown();
                let countdownInterval = setInterval(updateCountdown, 1000);

            } else {
                let remaining = 3 - failedAttempts;
                feedback.className = "message error";
                feedback.innerText = `ACCESS DENIED. INVALID CREDENTIALS. (${remaining} ATTEMPTS LEFT)`;
            }
        }
    });
    </script>
</body>
</html>
