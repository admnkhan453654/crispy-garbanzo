<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AK By Ayan Khan</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    padding-top:90px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    background:linear-gradient(-45deg,#25D366,#128C7E,#075E54,#34B7F1);
    background-size:400% 400%;
    animation:bgMove 8s infinite;
}


@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}


/* NAVBAR */

.navbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    background:rgba(3,8,16,.85);
    backdrop-filter:blur(20px);
    padding:16px 24px;
    z-index:100;
}


.nav-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    align-items:center;
}


.brand{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
}


.logo-box{
    width:42px;
    height:42px;
    background:#030810;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}


.logo-box img{
    width:34px;
    height:34px;
    border-radius:50%;
    object-fit:cover;
}


.brand-text{
    display:flex;
    flex-direction:column;
}


.title{
    color:white;
    font-size:14px;
    font-weight:900;
    letter-spacing:3px;
}


.subtitle{
    color:#00eaff;
    font-size:10px;
    display:flex;
    align-items:center;
    gap:7px;
    font-family:monospace;
}


.pulse{
    width:7px;
    height:7px;
    background:#00eaff;
    border-radius:50%;
    animation:pulse 1s infinite;
}


@keyframes pulse{
    50%{
        opacity:.2;
    }
}


/* INSTAGRAM BUTTON */

.instagram-btn{
    margin-left:auto;
    padding:10px 18px;
    background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
    color:white;
    text-decoration:none;
    border-radius:20px;
    font-size:13px;
    font-weight:bold;
}


/* CARD */

.box{

    width:90%;
    max-width:400px;
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.4);

}


.logo{

    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;

}


h1{

    color:#075E54;
    margin:15px 0;

}


p{

    color:#555;

}


#time{

    font-size:18px;
    margin-top:10px;

}


#status{

    font-size:22px;
    font-weight:bold;
    margin:20px;

}


.whatsapp-btn{

    display:block;
    margin-top:15px;
    padding:15px;
    background:#25D366;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;

}


.warning{

    display:none;
    background:red;
    color:white;
    padding:10px;
    border-radius:10px;
    margin-top:15px;

}


.powered-by{

    margin-top:20px;
    color:#075E54;
    font-weight:bold;

}

</style>

</head>


<body>


<nav class="navbar">

<div class="nav-container">


<a class="brand" href="#">

<div class="logo-box">
<img src="live.png">
</div>


<div class="brand-text">

<span class="title">
AK By Ayan Khan
</span>


<span class="subtitle">

<span class="pulse"></span>
Live System

</span>

</div>

</a>


<a class="instagram-btn"
href="https://instagram.com/ar20223_tv"
target="_blank">

📸 Instagram ar20223_tv

</a>


</div>

</nav>



<div class="box">


<img src="live.png" class="logo">


<h1>
AK By Ayan Khan
</h1>


<p>
DEAF HAPPY PIC COME YOU VS
</p>



<div id="time">
🕒 Loading Time...
</div>



<div id="status">
Checking Status...
</div>



<div id="warning" class="warning">
⚠️ WARNING! SYSTEM IS OFFLINE ⚠️
</div>



<a class="whatsapp-btn"
id="btn1"
href="https://wa.me/923122127740"
target="_blank">

📲 WhatsApp 03122127740

</a>



<a class="whatsapp-btn"
id="btn2"
href="https://wa.me/923181251104"
target="_blank">

📲 WhatsApp 03181251104

</a>



<div class="powered-by">
⚡ Powered By Ayan Khan
</div>


</div>



<script>

function updateStatus(){

let now=new Date();

let hour=now.getHours();


document.getElementById("time").innerHTML=
"🕒 "+now.toLocaleTimeString();



let status=document.getElementById("status");
let warning=document.getElementById("warning");
let box=document.querySelector(".box");
let buttons=document.querySelectorAll(".whatsapp-btn");


// OFF 8 AM TO 10 PM

let offline=(hour>=8 && hour<22);



if(offline){


document.body.style.background=
"linear-gradient(-45deg,#ff0000,#8b0000,#330000,#ff4444)";


box.style.border="4px solid red";

status.innerHTML="🔴 SYSTEM OFFLINE";
status.style.color="red";


warning.style.display="block";


buttons.forEach(btn=>{

btn.style.pointerEvents="none";
btn.style.background="#777";
btn.style.opacity=".5";
btn.innerHTML="🚫 Service Unavailable";

});


}

else{


status.innerHTML="🟢 SYSTEM ONLINE";
status.style.color="green";

warning.style.display="none";


buttons.forEach(btn=>{

btn.style.pointerEvents="auto";
btn.style.background="#25D366";
btn.style.opacity="1";

});


document.getElementById("btn1").innerHTML="📲 WhatsApp 03122127740";
document.getElementById("btn2").innerHTML="📲 WhatsApp 03181251104";


}


}


updateStatus();

setInterval(updateStatus,1000);


</script>


</body>
</html>
